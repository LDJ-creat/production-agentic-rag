services:
  api:
    command:
      [
        "/app/.venv/bin/uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "1",
        "--loop",
        "asyncio",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
    volumes:
      - ./src:/app/src
    environment:
      - TELEGRAM__ENABLED=false
